<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JDM Legends</title>
  <link rel="stylesheet" href="style.css">
  <meta name="robots" content="noindex">
</head>
<body>
  <section class="hero">
    <div class="overlay"></div>
    <div class="content">
      <h1>JDM LEGENDS</h1>
      <p>Explore os carros mais lendários da cultura automotiva japonesa.</p>
      <div class="buttons">
        <a class="btn" href="#galeria">Ver Galeria</a>
        <a class="btn ghost" href="#">Explorar Modelos</a>
      </div>
    </div>
  </section>

  <section class="gallery-section" id="galeria">
    <div class="gallery-header">
      <h2>Galeria</h2>
      <p>Algumas imagens que destacam a essência da cultura JDM.</p>
    </div>

    <div class="gallery-grid">
      <article class="gallery-card">
        <img src="assets/jdm.jpeg" alt="Carro JDM em destaque">
        <div class="card-caption">JDM em destaque</div>
      </article>

      <article class="gallery-card">
        <img src="assets/center.jpg" alt="Cena de carros JDM com paisagem">
        <div class="card-caption">Estética japonesa</div>
      </article>
    </div>
  </section>
</body>
</html>
